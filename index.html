<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sciqus Studio - a responsive React assignment dashboard with real interactions, persistent theme settings, and mobile-friendly navigation." />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        try {
          const saved = localStorage.getItem('vortex-theme')
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          const isDark = saved ? saved === 'dark' : prefersDark
          document.documentElement.classList.toggle('dark', isDark)
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light'
        } catch (error) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <title>Sciqus Studio - Frontend Assignment</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
